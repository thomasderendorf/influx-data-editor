<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfluxDB Editor</title>
<!-- Chart.js + date-fns adapter (fixes "method not implemented" error) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg:       #0d0f12;
    --surface:  #141720;
    --surface2: #1c2030;
    --border:   #2a2f42;
    --accent:   #e8ff47;
    --accent2:  #ff4757;
    --accent3:  #3ecfcf;
    --text:     #d0d6e8;
    --muted:    #5a6080;
    --danger:   #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  header .logo span { color: var(--muted); font-weight: 400; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .status-dot.ok  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.err { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }

  /* ---------- Layout ---------- */
  .layout { display: grid; grid-template-columns: var(--sidebar-w, 320px) 1fr; height: calc(100vh - 53px); }

  /* ---------- Sidebar ---------- */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    min-width: 160px;
    max-width: 700px;
  }

  /* Resize handle */
  .resize-handle {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 5px; cursor: col-resize; z-index: 50;
    background: transparent;
    transition: background .15s;
  }
  .resize-handle:hover, .resize-handle.dragging {
    background: var(--accent3);
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
  }
  select, input[type="text"], input[type="datetime-local"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; padding: 8px 10px; border-radius: 4px;
    outline: none; transition: border .2s;
  }
  select:focus, input:focus { border-color: var(--accent3); }
  select option { background: var(--surface2); }

  .time-row { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .time-row input { font-size: 11px; }

  .quick-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .qbtn {
    padding: 3px 8px; font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 3px; cursor: pointer; transition: all .15s; letter-spacing: .5px;
  }
  .qbtn:hover { border-color: var(--accent3); color: var(--accent3); }

  .btn {
    width: 100%; padding: 10px; margin-top: 8px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: .5px; cursor: pointer; border: none; border-radius: 4px;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #0d0f12; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-danger  { background: var(--danger);  color: #fff; margin-top: 4px; }
  .btn-danger:hover { filter: brightness(1.15); }
  .btn:disabled { opacity: .4; cursor: not-allowed; filter: none; }

  /* Messreihen-Suche */
  .meas-search {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .meas-search input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 6px 10px; border-radius: 4px; outline: none;
  }
  .meas-search input:focus { border-color: var(--accent3); }

  .meas-list {
    flex: 1; overflow-y: auto; padding: 4px;
  }
  .meas-item {
    padding: 7px 10px; border-radius: 4px; cursor: pointer;
    color: var(--muted); font-size: 11px; transition: all .12s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative;
  }
  .meas-item:hover  { background: var(--surface2); color: var(--text); }
  .meas-item.active { background: var(--surface2); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 8px; }

  /* Tooltip für volle Namen */
  .meas-item[title]:hover::after {
    content: attr(title);
    position: fixed;
    left: 330px;
    background: var(--surface2);
    border: 1px solid var(--accent3);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 9999;
    pointer-events: none;
    max-width: 600px;
  }

  /* ---------- Main ---------- */
  main {
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Chart */
  .chart-wrap {
    height: 220px; padding: 16px 20px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chart-wrap canvas { width: 100% !important; height: 100% !important; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sel-count {
    font-size: 11px; color: var(--muted); margin-left: auto;
  }
  .sel-count span { color: var(--accent); font-weight: 600; }

  /* Active measurement display */
  .active-meas {
    font-size: 11px; color: var(--accent3);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 400px;
  }

  .chk-all { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

  /* Table */
  .table-wrap { flex: 1; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { position: sticky; top: 0; z-index: 10; }
  th {
    background: var(--surface); padding: 9px 14px;
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; text-align: left; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 7px 14px; border-bottom: 1px solid #1a1f2e;
    vertical-align: middle; white-space: nowrap;
  }
  tbody tr { transition: background .1s; }
  tbody tr:hover   { background: var(--surface2); }
  tbody tr.checked { background: #1a1f2e; }
  tbody tr.checked td { color: var(--accent3); }

  td.val { font-weight: 600; color: #fff; }
  td.ts  { color: var(--muted); font-size: 11px; }
  td input[type=checkbox] { accent-color: var(--accent2); width: 14px; height: 14px; cursor: pointer; }

  /* Empty/loading */
  .empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-size: 12px;
    flex-direction: column; gap: 8px;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 12px 18px; border-radius: 6px; font-size: 12px;
    transform: translateY(80px); opacity: 0;
    transition: all .25s; z-index: 999; max-width: 320px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.ok  { border-color: var(--accent);  color: var(--accent); }
  #toast.err { border-color: var(--danger);  color: var(--danger); }

  /* Spinner */
  .spin {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--accent3);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Influx<span>Editor</span></div>
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText" style="font-size:11px;color:var(--muted)">nicht verbunden</span>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="sidebar-section">
      <label>Zeitbereich</label>
      <div class="time-row">
        <input type="datetime-local" id="fromDt" placeholder="Von">
        <input type="datetime-local" id="toDt"   placeholder="Bis">
      </div>
      <div class="quick-btns">
        <button class="qbtn" onclick="setRange(1,'h')">1h</button>
        <button class="qbtn" onclick="setRange(6,'h')">6h</button>
        <button class="qbtn" onclick="setRange(24,'h')">24h</button>
        <button class="qbtn" onclick="setRange(7,'d')">7d</button>
        <button class="qbtn" onclick="setRange(30,'d')">30d</button>
      </div>
      <button class="btn btn-primary" onclick="loadData()">▶ Laden</button>
    </div>

    <div class="meas-search">
      <input type="text" id="measSearch" placeholder="🔍 Messreihe suchen…" oninput="filterMeas(this.value)">
    </div>

    <div class="meas-list" id="measList">
      <div class="empty" style="height:60px"><span>Lade…</span></div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>

    <div class="toolbar">
      <input type="checkbox" class="chk-all" id="chkAll" onchange="toggleAll(this.checked)" title="Alle aus/abwählen">
      <span style="font-size:11px;color:var(--muted)">Alle</span>
      <button class="btn btn-danger" id="delBtn" onclick="deleteSelected()" disabled style="width:auto;padding:6px 16px;margin:0">
        ✕ Löschen
      </button>
      <span class="active-meas" id="activeMeasLabel">–</span>
      <span class="sel-count"><span id="selCount">0</span> ausgewählt &nbsp;|&nbsp; <span id="rowCount">–</span> Zeilen</span>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div class="empty" id="emptyMsg">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Messreihe wählen und Zeitbereich laden
      </div>
      <table id="dataTable" style="display:none">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let activeMeasurement = null;
let allMeasurements = [];
let columns = [];
let rows = [];
let selected = new Set();
let chart = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  setRange(24, 'h');
  await loadMeasurements();
})();

// ─── API helpers ──────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ─── Measurements ─────────────────────────────────────────────────────────────
async function loadMeasurements() {
  try {
    allMeasurements = await api('/api/measurements');
    allMeasurements.sort();
    setStatus(true, `${allMeasurements.length} Messreihen`);
    renderMeasList(allMeasurements);
  } catch(e) {
    setStatus(false, 'Verbindungsfehler');
    toast('Fehler: ' + e.message, 'err');
  }
}

function renderMeasList(list) {
  const el = document.getElementById('measList');
  el.innerHTML = '';
  if (!list.length) { el.innerHTML = '<div class="empty" style="height:60px">Keine Ergebnisse</div>'; return; }
  list.forEach(m => {
    const d = document.createElement('div');
    d.className = 'meas-item';
    d.textContent = m;
    d.title = m; // full name on hover
    if (m === activeMeasurement) d.classList.add('active');
    d.onclick = () => selectMeasurement(m, d);
    el.appendChild(d);
  });
}

function filterMeas(q) {
  const filtered = q ? allMeasurements.filter(m => m.toLowerCase().includes(q.toLowerCase())) : allMeasurements;
  renderMeasList(filtered);
}

function selectMeasurement(m, el) {
  document.querySelectorAll('.meas-item').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  activeMeasurement = m;
  document.getElementById('activeMeasLabel').textContent = m;
  loadData();
}

// ─── Data ─────────────────────────────────────────────────────────────────────
async function loadData() {
  if (!activeMeasurement) { toast('Bitte zuerst eine Messreihe wählen', 'err'); return; }
  const from = isoFromDt('fromDt');
  const to   = isoFromDt('toDt');
  showEmpty('<span class="spin"></span> Lade Daten…');

  try {
    const data = await api(`/api/data?measurement=${encodeURIComponent(activeMeasurement)}&from=${from}&to=${to}`);
    columns = data.columns || [];
    rows    = data.values  || [];
    selected.clear();
    renderTable();
    renderChart();
    updateSelUI();
    document.getElementById('rowCount').textContent = `${rows.length}`;
  } catch(e) {
    showEmpty('Fehler: ' + e.message);
    toast(e.message, 'err');
  }
}

// ─── Table ────────────────────────────────────────────────────────────────────
function renderTable() {
  if (!rows.length) { showEmpty('Keine Daten im Zeitbereich'); return; }
  hideEmpty();

  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  thead.innerHTML = '<tr><th></th>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';

  const timeIdx = columns.indexOf('time');
  const valIdx  = columns.findIndex(c => c !== 'time');

  tbody.innerHTML = '';
  rows.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + i;

    let cells = `<td><input type="checkbox" onchange="toggleRow(${i},this.checked)" id="chk-${i}"></td>`;
    row.forEach((v, ci) => {
      const cls = ci === timeIdx ? 'ts' : ci === valIdx ? 'val' : '';
      const display = ci === timeIdx ? fmtTs(v) : (v === null ? '–' : v);
      cells += `<td class="${cls}">${display}</td>`;
    });
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
}

// ─── Chart ────────────────────────────────────────────────────────────────────
function renderChart() {
  const timeIdx = columns.indexOf('time');
  const valCols = columns.map((c,i) => ({c,i})).filter(({c,i}) => c !== 'time' && typeof rows[0]?.[i] === 'number');

  const labels = rows.map(r => new Date(r[timeIdx])).reverse();
  const datasets = valCols.slice(0,3).map(({c,i}, di) => ({
    label: c,
    data: rows.map(r => r[i] ?? null).reverse(),
    borderColor: ['#3ecfcf','#e8ff47','#ff4757'][di],
    backgroundColor: ['rgba(62,207,207,.08)','rgba(232,255,71,.08)','rgba(255,71,87,.08)'][di],
    borderWidth: 1.5,
    pointRadius: rows.length < 200 ? 2 : 0,
    tension: 0.2,
    fill: true,
  }));

  if (chart) chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 200 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#5a6080', font: { family: 'JetBrains Mono', size: 10 }, boxWidth: 12 } },
        tooltip: { backgroundColor: '#1c2030', borderColor: '#2a2f42', borderWidth: 1,
          bodyFont: { family: 'JetBrains Mono', size: 11 }, titleFont: { family: 'JetBrains Mono', size: 11 } }
      },
      scales: {
        x: { type: 'time', ticks: { color: '#5a6080', font: { size: 10 } }, grid: { color: '#1a1f2e' } },
        y: { ticks: { color: '#5a6080', font: { size: 10 } }, grid: { color: '#1a1f2e' } }
      }
    }
  });
}

// ─── Selection ────────────────────────────────────────────────────────────────
function toggleRow(i, checked) {
  if (checked) selected.add(i); else selected.delete(i);
  const tr = document.getElementById('row-' + i);
  tr.classList.toggle('checked', checked);
  updateSelUI();
}

function toggleAll(checked) {
  rows.forEach((_, i) => {
    selected[checked ? 'add' : 'delete'](i);
    const tr = document.getElementById('row-' + i);
    const chk = document.getElementById('chk-' + i);
    if (tr) tr.classList.toggle('checked', checked);
    if (chk) chk.checked = checked;
  });
  updateSelUI();
}

function updateSelUI() {
  const n = selected.size;
  document.getElementById('selCount').textContent = n;
  document.getElementById('delBtn').disabled = n === 0;
}

// ─── Delete ───────────────────────────────────────────────────────────────────
async function deleteSelected() {
  if (!selected.size) return;
  if (!confirm(`${selected.size} Werte wirklich löschen?`)) return;

  const timeIdx = columns.indexOf('time');
  const timestamps = [...selected].map(i => rows[i][timeIdx]);

  try {
    const res = await api('/api/data', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ measurement: activeMeasurement, timestamps })
    });
    toast(`${res.deleted} Werte gelöscht`, 'ok');
    await loadData();
  } catch(e) {
    toast('Fehler beim Löschen: ' + e.message, 'err');
  }
}

// ─── Time helpers ─────────────────────────────────────────────────────────────
function setRange(n, unit) {
  const now = new Date();
  const from = new Date(now);
  if (unit === 'h') from.setHours(from.getHours() - n);
  if (unit === 'd') from.setDate(from.getDate() - n);
  document.getElementById('fromDt').value = toInputVal(from);
  document.getElementById('toDt').value   = toInputVal(now);
}

function toInputVal(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function isoFromDt(id) {
  const v = document.getElementById(id).value;
  return v ? new Date(v).toISOString() : '';
}

function fmtTs(ms) {
  return new Date(ms).toLocaleString('de-DE', { dateStyle:'short', timeStyle:'medium' });
}

// ─── Sidebar resize ───────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('resizeHandle');
  const layout  = document.querySelector('.layout');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = document.getElementById('sidebar').offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(700, Math.max(160, startW + (e.clientX - startX)));
    layout.style.setProperty('--sidebar-w', w + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();


function showEmpty(msg) {
  document.getElementById('emptyMsg').innerHTML = msg;
  document.getElementById('emptyMsg').style.display = 'flex';
  document.getElementById('dataTable').style.display = 'none';
}
function hideEmpty() {
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('dataTable').style.display = '';
}

function setStatus(ok, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('statusText').textContent = msg;
}

let _tid;
function toast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(_tid);
  _tid = setTimeout(() => t.className = '', 3500);
}
</script>
</body>
</html>
